name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }

      - uses: Swatinem/rust-cache@v2

      - name: macOS — add universal target
        if: matrix.os == 'macos-14'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
      - run: pnpm check

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      # Bundle step intentionally not run on CI: tauri.conf.json's
      # `createUpdaterArtifacts: true` requires TAURI_SIGNING_PRIVATE_KEY, which
      # we don't expose to PR builds (extractable from forks). The bundle is
      # exercised end-to-end by release.yml on tag push, with the secret available.
