name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy, rustfmt }

      - uses: Swatinem/rust-cache@v2

      - name: macOS — add universal target
        if: matrix.os == 'macos-14'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - run: pnpm install --frozen-lockfile

      - run: pnpm test
      - run: pnpm check

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

      - run: pnpm tauri build --target ${{ matrix.target }}
        env:
          # Code-signing skipped on CI for v1 (per spec §11).
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: voxtide-${{ matrix.os }}
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.exe
          if-no-files-found: warn
