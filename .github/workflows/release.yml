name: Release

on:
  push:
    tags: ['v*.*.*']
  # Manual re-trigger for an existing tag (e.g. after editing this workflow or rotating
  # signing secrets). Pass the tag as `ref` when dispatching from the CLI/UI.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # macOS distribution is handled by `scripts/release.sh` running locally on the
  # release author's machine — universal DMG + updater tarball + .sig + latest.json
  # are uploaded directly to the GitHub release before this workflow even fires.
  # CI's job is to add Windows MSIs (which release.sh can't cross-build).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Add arm64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --target ${{ matrix.target }}
        env:
          # Required because tauri.conf.json has `bundle.createUpdaterArtifacts: true`.
          # The build aborts otherwise — the public key is embedded in conf, but
          # signing the per-platform updater payload needs the matching private key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows code-signing cert intentionally omitted (per spec §11 v1 ships
          # unsigned Windows binaries — SmartScreen warning is acceptable for a
          # personal-project release model). Add WINDOWS_CERTIFICATE secrets when
          # an EV cert exists.

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.nsis.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
