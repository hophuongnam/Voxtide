name: Release

on:
  push:
    tags: ['v*.*.*']
  # Manual re-trigger for an existing tag (e.g. after editing this workflow or rotating
  # signing secrets). Run from `main` and pass the tag to build via the `tag` input —
  # `--ref` would otherwise check out the workflow yaml from the tag, which may not
  # have this dispatch trigger.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.1.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # macOS distribution is handled by `scripts/release.sh` running locally on the
  # release author's machine — universal DMG + updater tarball + .sig + a mac-only
  # latest.json are uploaded to a DRAFT release before the tag is pushed (so this
  # workflow fires only once everything mac-side is already in place). CI's job is
  # to add the Windows builds, complete latest.json, and PUBLISH the draft — the
  # fleet-facing `releases/latest` endpoints never see a half-built release.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On push, github.ref is the tag itself. On workflow_dispatch, fall back
          # to the tag input so the build matches the release we're appending to.
          ref: ${{ inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Add arm64 target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        run: rustup target add aarch64-pc-windows-msvc

      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --target ${{ matrix.target }}
        env:
          # Required because tauri.conf.json has `bundle.createUpdaterArtifacts: true`.
          # The build aborts otherwise — the public key is embedded in conf, but
          # signing the per-platform updater payload needs the matching private key.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Windows code-signing cert intentionally omitted (per spec §11 v1 ships
          # unsigned Windows binaries — SmartScreen warning is acceptable for a
          # personal-project release model). Add WINDOWS_CERTIFICATE secrets when
          # an EV cert exists.

      - uses: softprops/action-gh-release@v2
        with:
          # Same dual-source as checkout: tag-name from input (dispatch) or github.ref_name (push).
          tag_name: ${{ inputs.tag || github.ref_name }}
          # The release already exists as a DRAFT (created by release.sh with the
          # mac assets). draft: true is load-bearing: without it this step would
          # PUBLISH the release while latest.json still lacks the Windows
          # platforms — finalize-manifest below is the only place that un-drafts.
          draft: true
          # Tauri 2 NSIS output is named `<productName>_<version>_<arch>-setup.exe`,
          # plus a parallel `.sig` file when createUpdaterArtifacts is on. The MSI
          # ships as the manual installer; the .exe + .sig is what the updater consumes.
          files: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Adds windows-x86_64 + windows-aarch64 platform blocks to latest.json so the
  # in-app updater works on Windows installs (release.sh wrote a darwin-only
  # manifest from the mac box; CI fills in the rest after the Windows builds).
  finalize-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: t
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Download manifest + Windows signatures from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.t.outputs.tag }}
        run: gh release download "$TAG" -R ${{ github.repository }} -p latest.json -p '*-setup.exe.sig' --clobber

      - name: Merge Windows platforms into latest.json
        env:
          TAG: ${{ steps.t.outputs.tag }}
        run: |
          set -euo pipefail
          ver="${TAG#v}"
          url_base="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          x64_sig="$(cat "Voxtide_${ver}_x64-setup.exe.sig")"
          arm64_sig="$(cat "Voxtide_${ver}_arm64-setup.exe.sig")"
          jq --arg x64sig "$x64_sig" \
             --arg arm64sig "$arm64_sig" \
             --arg x64url "${url_base}/Voxtide_${ver}_x64-setup.exe" \
             --arg arm64url "${url_base}/Voxtide_${ver}_arm64-setup.exe" \
             '.platforms["windows-x86_64"] = {signature: $x64sig, url: $x64url} |
              .platforms["windows-aarch64"] = {signature: $arm64sig, url: $arm64url}' \
             latest.json > latest.json.new
          mv latest.json.new latest.json
          jq . latest.json

      - name: Re-upload latest.json (clobber)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.t.outputs.tag }}
        run: gh release upload "$TAG" latest.json --clobber -R ${{ github.repository }}

      - name: Publish the draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.t.outputs.tag }}
        # The single point where the release goes live: every asset (mac + win)
        # and the completed latest.json are already attached, so the
        # `releases/latest/download/latest.json` endpoint can never 404 or
        # serve a manifest missing platforms. Publishing an existing-tag draft
        # creates no new tag ref, so this cannot re-trigger the workflow.
        run: gh release edit "$TAG" --draft=false --latest -R ${{ github.repository }}
